<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Feud: Bullseye A/B/C Test - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap');

        /* STRICT VIEWPORT LOCK - Prevents URL bar sliding and screen bouncing */
        html, body { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            width: 100%; height: 100%; overflow: hidden; 
            touch-action: none; overscroll-behavior: none;
            font-family: 'Inter', sans-serif; background: #000; color: #fff; user-select: none;
        }
        
        .ff-font { font-family: 'Bungee', cursive; }

        /* A/B/C START SCREEN */
        #abOverlay {
            position: absolute; inset: 0; z-index: 200; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; flex-direction: column; items: center; justify-content: center; padding: 2rem;
            text-align: center;
        }

        .start-title {
            font-size: 5rem; line-height: 0.9;
            background: linear-gradient(to bottom, #fff 0%, #fbbf24 40%, #d97706 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.6));
            margin-bottom: 1rem; transform: skewX(-5deg) scale(1.1);
        }

        /* --- THE BIG BOARD --- */
        .board-frame {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #172554 100%);
            border: 4px solid #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4), inset 0 0 40px rgba(0,0,0,0.6);
            border-top-left-radius: 40px; border-top-right-radius: 40px;
            position: relative; overflow: hidden;
        }

        .board-frame::after {
            content: ""; position: absolute; top: -100%; left: -100%; width: 50%; height: 300%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: sheen 4s infinite; pointer-events: none;
        }
        @keyframes sheen { 0% { transform: translateX(-100%) rotate(45deg); } 20%, 100% { transform: translateX(400%) rotate(45deg); } }

        .answer-card { perspective: 1000px; height: 60px; cursor: pointer; width: 100%; }
        .answer-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1.2); transform-style: preserve-3d; }
        .answer-card.revealed .answer-inner { transform: rotateX(180deg); }
        .answer-card.dimmed { opacity: 0.5; filter: grayscale(0.5); }
        
        .answer-front, .answer-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 24px; border-radius: 8px; border: 2px solid rgba(251, 191, 36, 0.3);
        }
        .answer-front { background: linear-gradient(#1e3a8a, #172554); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .answer-back { background: linear-gradient(#fbbf24, #d97706); color: #000; transform: rotateX(180deg); border: 3px solid #fff; font-weight: 900; }

        /* --- CAMERA & IMPACT --- */
        .camera-zoom { transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1); will-change: transform; }
        
        @keyframes flash-out { 0% { opacity: 0.8; } 100% { opacity: 0; } }
        .animate-flash { animation: flash-out 0.2s ease-out forwards; }

        /* --- NEW BULLSEYE JUICE --- */
        @keyframes world-shake {
            0%, 100% { transform: translateX(0) translateY(0); }
            20% { transform: translateX(-10px) translateY(-5px) rotate(-1deg); }
            40% { transform: translateX(10px) translateY(5px) rotate(1deg); }
            60% { transform: translateX(-5px) translateY(-10px) rotate(-1deg); }
            80% { transform: translateX(5px) translateY(10px) rotate(1deg); }
        }
        .world-shake-anim { animation: world-shake 0.5s ease-out; }

        @keyframes shockwave {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; border-width: 30px; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; border-width: 0px; }
        }
        .shockwave-ring {
            position: absolute; left: 50%; top: 50%; border-radius: 50%; border: solid #fbbf24;
            pointer-events: none; z-index: 95; animation: shockwave 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes coin-fountain {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            40% { transform: translate(calc(-50% + var(--vx)), var(--vy-peak)) scale(1.2); }
            100% { transform: translate(calc(-50% + var(--vx) * 1.5), 800px) scale(1) rotate(720deg); opacity: 0;}
        }
        .fountain-coin {
            position: absolute; background: linear-gradient(#fbbf24, #f59e0b); border-radius: 50%; z-index: 180;
            border: 2px solid #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: coin-fountain 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes bullseye-splash {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(2.5); opacity: 1; filter: brightness(2); }
            30% { transform: translate(-50%, -50%) scale(1.8); opacity: 1; filter: brightness(1); }
            70% { transform: translate(-50%, -50%) scale(1.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }
        .animate-bullseye-splash { animation: bullseye-splash 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* --- CHARACTER DESIGN --- */
        .cannon-base { 
            width: 120px; height: 100px; background: linear-gradient(#475569, #1e293b); 
            border-radius: 60px 60px 0 0; border: 4px solid #0f172a; position: relative; 
            overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .stevie-wrapper {
            position: absolute; bottom: -110px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 100px; transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .stevie-wrapper.peeking { bottom: 0px; }
        #stevie-goggles { transition: transform 0.3s cubic-bezier(0.6, -0.28, 0.735, 0.045); transform-origin: center; }
        .goggles-down #stevie-goggles { transform: translateY(14px); }
        #stevie-mouth { transition: d 0.2s; }

        @keyframes stevie-fly {
            0% { transform: translate(-50%, 0) scale(1.5); }
            100% { transform: translate(-50%, var(--end-y)) scale(0.5); }
        }
        .flying-stevie { animation: stevie-fly 0.6s cubic-bezier(0.3, 0, 0.2, 1) forwards !important; }

        @keyframes debris-fly-by {
            0% { transform: translate(-50%, -50%) scale(0.2) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(4) rotate(var(--tr)); opacity: 0; }
        }
        .debris-strike {
            position: absolute; left: 50%; top: 35%;
            width: 30px; height: 30px; background: #ef4444; border: 2px solid #fff;
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-family: 'Bungee'; color: white; z-index: 150; pointer-events: none;
            animation: debris-fly-by 0.6s ease-out forwards;
        }

        .survey-splash-text {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; font-size: 3rem; color: #fbbf24; text-shadow: 0 0 20px rgba(0,0,0,1);
            pointer-events: none; opacity: 0; white-space: nowrap; text-align: center;
        }
        
        @keyframes survey-splash {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
        .animate-splash { animation: survey-splash 1s ease-in-out forwards; }

        .bullseye-target {
            width: 80px; height: 80px; border-radius: 50%;
            background: repeating-radial-gradient(circle, #ff3b3b 0, #ff3b3b 10px, #fbbf24 10px, #fbbf24 20px, #2563eb 20px, #2563eb 30px, #000 30px, #000 40px);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.6); border: 3px solid white;
            animation: pulse-target 1.5s infinite ease-in-out; cursor: pointer;
        }

        .room-wall { background-color: #064e3b; background-image: repeating-linear-gradient(0deg, transparent, transparent 20px, rgba(0,0,0,0.1) 20px, rgba(0,0,0,0.1) 40px); }
        .prop-visual.is-damaged { filter: grayscale(1) brightness(0.1) contrast(1.5); transition: filter 0.8s ease-in-out; }
        .damage-vfx-container { position: absolute; inset: -20px; pointer-events: none; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .strike-orbit { position: absolute; width: 110%; height: 110%; animation: orbit-spin var(--duration) linear infinite; }
        .orbit-item {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 32px; height: 32px; background: #ef4444; border: 2px solid white; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-family: 'Bungee'; color: white; font-weight: 900;
            box-shadow: 0 0 15px rgba(239, 68, 68, 1); font-size: 18px;
        }
        @keyframes orbit-spin { from { transform: rotate(0deg) scaleX(1.3) rotate(0deg); } to { transform: rotate(360deg) scaleX(1.3) rotate(-360deg); } }

        .console-slide { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        .console-slide.show { transform: translateY(0); }
        .banner-slide { transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .banner-slide.show { transform: translateY(0); }

        .stevie-trophy {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            z-index: 120; transform-origin: bottom; animation: trophy-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
        }
        @keyframes trophy-pop { 0% { transform: translateX(-50%) scale(0); } 100% { transform: translateX(-50%) scale(0.8); } }
        
        .coin-rain { position: absolute; background: #fbbf24; border-radius: 50%; animation: rain 1s linear forwards; z-index: 90; }
        @keyframes rain { 0% { transform: translateY(-100px); } 100% { transform: translateY(800px) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- START SCREEN -->
    <div id="abOverlay">
        <div class="flex flex-col items-center">
            <div class="ff-font start-title text-5xl">BULLSEYE</div>
            <p class="text-blue-300 font-bold mb-8 tracking-[0.2em] text-xs uppercase opacity-80">A/B/C VARIANT TEST</p>
            <div class="flex flex-col gap-4 w-full max-w-[280px]">
                <button onclick="startTest('strikes')" class="w-full bg-red-600 py-4 rounded-2xl ff-font text-lg shadow-[0_6px_0_#991b1b] active:translate-y-1 active:shadow-none transition-all">STRIKES</button>
                <button onclick="startTest('no-strikes')" class="w-full bg-blue-600 py-4 rounded-2xl ff-font text-lg shadow-[0_6px_0_#1e3a8a] active:translate-y-1 active:shadow-none transition-all">NO STRIKES</button>
                <button onclick="startTest('stevie')" class="w-full bg-amber-500 py-5 rounded-2xl ff-font text-xl shadow-[0_6px_0_#92400e] active:translate-y-1 active:shadow-none transition-all border-2 border-white/50">STEVIE (C)</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="app" class="relative w-full max-w-[430px] h-full bg-black overflow-hidden shadow-2xl flex flex-col mx-auto">
        <!-- Header -->
        <div class="z-50 bg-white/5 backdrop-blur-lg p-4 pt-10 flex justify-between items-center border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full border-2 border-yellow-500 overflow-hidden"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Andy"></div>
                <div>
                    <div id="modeLabel" class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest leading-none">Variant: A</div>
                    <div class="text-sm font-black uppercase">Andy's Home</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="ff-font text-blue-400 text-xl tracking-tighter">x50</div>
                <button onclick="exitToStart()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center border border-white/20">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </div>

        <div id="gameWorld" class="relative flex-grow bg-emerald-950 overflow-hidden">
            <!-- CAMERA LAYER -->
            <div id="camera" class="absolute inset-0 camera-zoom">
                <div class="absolute inset-0 h-[65%] room-wall border-b-8 border-amber-900 shadow-2xl"></div>
                <div class="absolute inset-x-0 bottom-0 h-[35%] bg-[#3d1f0a]"></div>

                <div id="prop-arcade" class="absolute top-[20%] left-[15%] w-24 h-40 z-10">
                    <div class="prop-visual absolute inset-0 bg-indigo-900 border-4 border-indigo-950 rounded-t-xl shadow-2xl transition-all"></div>
                    <div class="absolute inset-0 flex items-center justify-center target-container">
                        <div onclick="selectTarget('prop-arcade', event)" class="bullseye-target"></div>
                    </div>
                </div>

                <div id="prop-pool" class="absolute bottom-[25%] left-1/2 -translate-x-1/2 w-64 h-32 z-20">
                    <div class="prop-visual absolute inset-0 bg-amber-900 border-8 border-amber-950 rounded-xl shadow-2xl transition-all">
                         <div class="w-full h-full bg-emerald-700 m-1 border-4 border-emerald-900"></div>
                    </div>
                    <div class="absolute inset-0 flex items-center justify-center target-container">
                        <div onclick="selectTarget('prop-pool', event)" class="bullseye-target" style="width: 100px; height: 100px;"></div>
                    </div>
                </div>
            </div>

            <div id="sceneDimmer" class="absolute inset-0 z-30 bg-black/60 opacity-0 pointer-events-none transition-opacity"></div>
            <!-- Effect Layer strictly isolated -->
            <div id="effectLayer" class="absolute inset-0 z-[60] overflow-hidden pointer-events-none"></div>
            
            <div id="surveySplash" class="ff-font survey-splash-text">SURVEY SAYS!</div>
            <div id="hitSplash" class="ff-font survey-splash-text text-white" style="-webkit-text-stroke: 3px #2563eb;">HIT!</div>
            <div id="bullseyeSplash" class="ff-font survey-splash-text text-red-500" style="-webkit-text-stroke: 3px white;">BULLSEYE!</div>
            <div id="multiplierSplash" class="ff-font survey-splash-text text-yellow-400 mt-16" style="font-size: 2rem;">X40</div>

            <!-- Arming Console -->
            <div id="armingConsole" class="absolute inset-x-0 bottom-0 z-[55] console-slide pointer-events-none">
                <div id="consoleBomb" class="relative z-20 flex justify-center -mb-4 pointer-events-auto">
                    
                    <!-- CLASSIC BOMB -->
                    <div id="bombVisual" class="relative w-20 h-20 bg-zinc-800 rounded-full border-4 border-zinc-700 shadow-2xl hidden">
                        <div id="bombSpark" class="absolute -top-1 right-3 w-6 h-6 bg-yellow-400 rounded-full opacity-0"></div>
                    </div>

                    <!-- STEVIE CANNON -->
                    <div id="cannonVisual" class="cannon-base flex justify-center items-end hidden">
                        <div id="stevieChar" class="stevie-wrapper">
                            <svg width="80" height="100" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="15" y="40" width="50" height="60" rx="20" fill="#3B82F6" stroke="#1D4ED8" stroke-width="3"/>
                                <circle cx="40" cy="35" r="28" fill="#FDE68A" stroke="#000" stroke-width="2"/>
                                <circle id="eye-l" cx="30" cy="35" r="4" fill="black"/>
                                <circle id="eye-r" cx="50" cy="35" r="4" fill="black"/>
                                <path id="stevie-mouth" d="M30 48 Q40 48 50 48" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>
                                <g id="stevie-goggles">
                                    <rect x="12" y="10" width="56" height="18" rx="8" fill="#475569" stroke="black" stroke-width="2"/>
                                    <rect x="18" y="14" width="18" height="10" rx="4" fill="#94A3B8"/>
                                    <rect x="44" y="14" width="18" height="10" rx="4" fill="#94A3B8"/>
                                    <path d="M12 19 L0 19" stroke="black" stroke-width="2"/>
                                    <path d="M68 19 L80 19" stroke="black" stroke-width="2"/>
                                </g>
                                <path d="M12 35 A28 28 0 0 1 68 35" fill="none" stroke="#EF4444" stroke-width="4"/>
                            </svg>
                        </div>
                        <div id="cannonSpark" class="absolute -top-1 right-6 w-6 h-6 bg-yellow-400 rounded-full opacity-0"></div>
                    </div>

                </div>
                <div class="board-frame p-6 pt-12 pointer-events-auto">
                    <div id="question" class="text-center mb-6 px-4 ff-font text-lg leading-tight text-white drop-shadow-md">...</div>
                    <div id="options" class="grid gap-3"></div>
                </div>
            </div>
        </div>

        <div id="resultBanner" class="absolute bottom-0 left-0 right-0 z-[70] bg-white text-black p-8 rounded-t-[40px] banner-slide flex flex-col items-center shadow-2xl">
            <div class="ff-font text-5xl text-emerald-600 tracking-tighter" id="tickCounter">0</div>
            <button onclick="reset()" class="w-full bg-blue-600 text-white ff-font mt-6 py-5 rounded-2xl">COLLECT</button>
        </div>
    </div>

    <script>
        let abMode = 'strikes';
        const triviaData = {
            strikes: [
                { q: "Name a place you have to be quiet.", a: [{t: "LIBRARY", m: 50, bull: true}, {t: "GYM", m: 0, bull: false}] }
            ],
            noStrikes: [
                { q: "Name something people bring to a party.", a: [{t: "CHIPS", m: 40, bull: true}, {t: "DRINKS", m: 25, bull: false}, {t: "LUGGAGE", m: 10, bull: false}] }
            ]
        };

        let state = { busy: false, target: null, currentQuestionOptions: [], activeTag: null };

        function startTest(mode) {
            abMode = mode;
            document.getElementById('abOverlay').style.display = 'none';
            document.getElementById('modeLabel').innerText = 'Variant: ' + mode.toUpperCase();

            document.getElementById('bombVisual').style.display = (mode === 'stevie') ? 'none' : 'block';
            document.getElementById('cannonVisual').style.display = (mode === 'stevie') ? 'flex' : 'none';
        }

        function exitToStart() {
            document.getElementById('abOverlay').style.display = 'flex';
            reset();
            document.querySelectorAll('.prop-visual').forEach(v => v.classList.remove('is-damaged'));
            document.querySelectorAll('.damage-vfx-container, .stevie-trophy').forEach(v => v.remove());
        }

        function selectTarget(id, e) {
            if (state.busy) return;
            state.busy = true;
            const world = document.getElementById('gameWorld').getBoundingClientRect();
            const prop = document.getElementById(id);
            const rect = prop.getBoundingClientRect();
            const x = rect.left + rect.width/2 - world.left;
            const y = rect.top + rect.height/2 - world.top;
            state.target = { id, x, y };

            const cam = document.getElementById('camera');
            cam.style.transformOrigin = `${x}px ${y}px`;
            cam.style.transform = `translate(${world.width/2 - x}px, ${world.height*0.35 - y}px) scale(1.8)`;

            document.getElementById('sceneDimmer').style.opacity = '1';
            document.getElementById('armingConsole').classList.add('show');
            
            if(abMode === 'stevie') {
                document.getElementById('stevieChar').classList.add('peeking');
                setStevieExpression('neutral');
            }

            const pool = (abMode === 'strikes') ? triviaData.strikes : triviaData.noStrikes;
            const data = pool[Math.floor(Math.random()*pool.length)];
            state.currentQuestionOptions = data.a.sort(() => Math.random() - 0.5);
            document.getElementById('question').innerText = data.q;
            document.getElementById('options').innerHTML = state.currentQuestionOptions.map((opt, i) => {
                const badge = (abMode === 'strikes') ? '' : `<span class="multiplier-badge ff-font text-xl">x${opt.m}</span>`;
                return `<div class="answer-card" id="card-${i}" onclick="handleSelect(${i}, this)">
                    <div class="answer-inner">
                        <div class="answer-front"><span>${opt.t}</span> <div class="w-5 h-5 border-2 border-white/20 rounded-full"></div></div>
                        <div class="answer-back"><span>${opt.t}</span> ${badge}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function setStevieExpression(mood) {
            const mouth = document.getElementById('stevie-mouth');
            const character = document.getElementById('stevieChar');
            if (mood === 'happy') {
                mouth.setAttribute('d', 'M30 45 Q40 55 50 45');
                character.classList.add('goggles-down');
            } else if (mood === 'scared') {
                mouth.setAttribute('d', 'M35 48 L45 48');
                character.classList.add('goggles-down');
            } else {
                mouth.setAttribute('d', 'M30 48 Q40 48 50 48');
                character.classList.remove('goggles-down');
            }
        }

        function handleSelect(idx, el) {
            if (el.dataset.clicked) return;
            el.dataset.clicked = "true";
            const selected = state.currentQuestionOptions[idx];

            if(abMode === 'stevie') setStevieExpression(selected.m > 0 ? 'happy' : 'scared');

            el.classList.add('revealed');
            
            const sparkId = (abMode === 'stevie') ? 'cannonSpark' : 'bombSpark';
            document.getElementById(sparkId).classList.add('opacity-100', 'animate-ping');
            
            state.currentQuestionOptions.forEach((_, i) => {
                if(i !== idx) setTimeout(() => {
                    const c = document.getElementById(`card-${i}`);
                    if(c) c.classList.add('revealed', 'dimmed');
                }, (i+1)*200);
            });

            setTimeout(() => {
                document.getElementById('surveySplash').classList.add('animate-splash');
                setTimeout(() => {
                    const worldRect = document.getElementById('gameWorld').getBoundingClientRect();
                    document.getElementById('armingConsole').classList.remove('show');
                    document.getElementById('sceneDimmer').style.opacity = '0';
                    launch(selected, worldRect.width/2, 0);
                }, 1000);
            }, 1000);
        }

        function launch(data, sx, sy) {
            const world = document.getElementById('gameWorld').getBoundingClientRect();
            const projectile = document.createElement('div');
            projectile.className = 'absolute z-[65] w-24 h-24 pointer-events-none';
            projectile.style.left = '50%'; projectile.style.bottom = '100px';
            
            if(abMode === 'stevie') {
                projectile.innerHTML = `<div class="stevie-wrapper peeking goggles-down" style="bottom:0">${document.getElementById('stevieChar').innerHTML}</div>`;
            } else {
                projectile.innerHTML = `<div class="relative w-20 h-20 bg-zinc-800 rounded-full border-4 border-zinc-700 shadow-2xl mx-auto"></div>`;
            }
            
            document.getElementById('effectLayer').appendChild(projectile);
            const dy = -(world.height * 0.55);
            projectile.style.setProperty('--end-y', `${dy}px`);
            projectile.classList.add('flying-stevie');

            setTimeout(() => {
                projectile.remove();
                document.querySelectorAll('.target-container').forEach(t => t.style.opacity = '0');
                if (data.m > 0) executeHit(data); else executeMiss();
            }, 500);
        }

        function executeHit(data) {
            const flash = document.createElement('div');
            flash.className = 'absolute inset-0 bg-white z-[200] animate-flash pointer-events-none';
            document.getElementById('app').appendChild(flash);
            setTimeout(() => flash.remove(), 250);

            for(let i=0; i<4; i++) {
                const d = document.createElement('div');
                d.className = 'debris-strike'; d.innerText = 'X';
                d.style.setProperty('--tx', `${(Math.random()-0.5)*800}px`);
                d.style.setProperty('--ty', `${(Math.random()-0.5)*800}px`);
                d.style.setProperty('--tr', `${(Math.random()-0.5)*500}deg`);
                document.getElementById('effectLayer').appendChild(d);
                setTimeout(() => d.remove(), 600);
            }

            const prop = document.getElementById(state.target.id);
            prop.querySelector('.prop-visual').classList.add('is-damaged');
            
            if(abMode === 'stevie') {
                const trophy = document.createElement('div');
                trophy.className = 'stevie-trophy';
                trophy.innerHTML = `<div class="stevie-wrapper peeking goggles-down" style="bottom:0">${document.getElementById('stevieChar').innerHTML}</div>`;
                prop.appendChild(trophy);
            }

            let count = (data.m >= 40) ? 3 : (data.m >= 25 ? 2 : 1);
            const vfx = document.createElement('div');
            vfx.className = 'damage-vfx-container';
            let h = `<div class="energy-ring"></div>`;
            for(let i=0; i<count; i++) h += `<div class="strike-orbit" style="--duration: ${4+i*0.5}s; transform: rotateX(${i*20}deg)"><div class="orbit-item">X</div></div>`;
            vfx.innerHTML = h; prop.appendChild(vfx);

            spawnSocialTag(data.m * 2000);
            document.getElementById('multiplierSplash').innerText = `X${data.m}`;
            document.getElementById('multiplierSplash').classList.add('animate-splash');

            // NEW BULLSEYE LOGIC
            if(data.m >= 40) {
                // 1. Expanding Golden Shockwaves
                const sw1 = document.createElement('div'); sw1.className = 'shockwave-ring w-24 h-24'; prop.appendChild(sw1);
                setTimeout(() => { const sw2 = document.createElement('div'); sw2.className = 'shockwave-ring w-32 h-32'; prop.appendChild(sw2); }, 150);
                
                // 2. Violent Screen Shake
                const gw = document.getElementById('gameWorld');
                gw.classList.remove('world-shake-anim'); void gw.offsetWidth; gw.classList.add('world-shake-anim');
                
                // 3. Exaggerated Splash Text
                document.getElementById('bullseyeSplash').classList.add('animate-bullseye-splash');
                
                // 4. Jackpot Coin Fountain
                fountainCoins();
            } else {
                document.getElementById('hitSplash').classList.add('animate-splash');
                rainCoins();
            }

            showResult(data.m * 2000);
        }

        function fountainCoins() {
            // Shoots directly upward from the target (center of zoomed camera)
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const c = document.createElement('div'); 
                    c.className = 'fountain-coin flex items-center justify-center text-[#92400e] font-black text-[12px]';
                    c.style.width = '30px'; c.style.height = '30px'; 
                    c.style.left = '50%'; c.style.top = '35%';
                    c.innerHTML = '$';
                    c.style.setProperty('--vx', `${(Math.random()-0.5)*500}px`);
                    c.style.setProperty('--vy-peak', `-${Math.random()*300 + 100}px`);
                    document.getElementById('effectLayer').appendChild(c);
                    setTimeout(() => c.remove(), 1500);
                }, i*20);
            }
        }

        function spawnSocialTag(val) {
            const t = document.createElement('div');
            /* Optimized transition - swapped 'top' transition for hardware-accelerated transform */
            t.className = 'absolute z-[80] left-1/2 -translate-x-1/2 flex items-center gap-3 bg-white p-2 pr-6 rounded-full shadow-2xl transition-all duration-700 opacity-0';
            t.style.top = '12%'; 
            t.style.transform = 'translate(-50%, 50px)';
            t.innerHTML = `<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Me" class="w-10 h-10 rounded-full border-2 border-blue-400"><div><div class="text-[10px] font-black text-blue-600 uppercase tracking-tighter">LOOTED!</div><div class="text-xl ff-font text-green-600">+${val.toLocaleString()}</div></div>`;
            document.getElementById('effectLayer').appendChild(t);
            
            requestAnimationFrame(() => { 
                t.style.transform = 'translate(-50%, 0)';
                t.style.opacity = '1'; 
            });
            state.activeTag = t;
        }

        function executeMiss() {
            const x = document.createElement('div');
            x.className = 'absolute z-[70] ff-font text-9xl text-red-600 -translate-x-1/2 -translate-y-1/2 strike-x-big';
            x.style.left = '50%'; x.style.top = '35%'; x.innerText = 'X';
            document.getElementById('effectLayer').appendChild(x);
            setTimeout(() => x.remove(), 1000);
            showResult(5000);
        }

        function rainCoins() {
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const c = document.createElement('div'); c.className = 'coin-rain shadow-lg';
                    c.style.width = '24px'; c.style.height = '24px'; c.style.left = Math.random()*100+'%';
                    document.getElementById('effectLayer').appendChild(c);
                    setTimeout(() => c.remove(), 1000);
                }, i*25);
            }
        }

        function showResult(total) {
            document.getElementById('resultBanner').classList.add('show');
            let curr = 0; const step = total/20;
            const t = setInterval(() => { 
                curr += step; 
                if(curr >= total) { curr = total; clearInterval(t); } 
                document.getElementById('tickCounter').innerText = Math.floor(curr).toLocaleString(); 
            }, 30);
        }

        function reset() {
            document.getElementById('resultBanner').classList.remove('show');
            const cam = document.getElementById('camera');
            cam.style.transform = '';
            cam.style.transformOrigin = 'center';
            document.getElementById('gameWorld').classList.remove('world-shake-anim');
            document.querySelectorAll('.prop-visual').forEach(v => v.classList.remove('prop-impact-anim'));
            document.querySelectorAll('.target-container').forEach(t => t.style.opacity = '1');
            
            // Clean up splashes
            ['surveySplash', 'bullseyeSplash', 'hitSplash', 'multiplierSplash'].forEach(id => {
                document.getElementById(id).classList.remove('animate-splash', 'animate-bullseye-splash');
            });
            
            document.getElementById('bombSpark').classList.remove('opacity-100', 'animate-ping');
            document.getElementById('cannonSpark').classList.remove('opacity-100', 'animate-ping');
            document.getElementById('armingConsole').classList.remove('show');
            document.getElementById('sceneDimmer').style.opacity = '0';
            const s = document.getElementById('stevieChar');
            s.classList.remove('peeking', 'goggles-down');
            setStevieExpression('neutral');
            if (state.activeTag) { state.activeTag.remove(); state.activeTag = null; }
            state.busy = false;
        }
    </script>
</body>
</html>
