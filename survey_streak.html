<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survey Streak: Moon Shot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #002b5c;
            --gold: #fdb813;
            --red: #e31837;
            --green: #22c55e;
            --dark-blue: #001a35;
            --sky-blue: #4fb3ff;
            --slot-h: 80px;
            --slot-gap: 12px;
        }

        body {
            background: linear-gradient(180deg, #001a35 0%, #000000 100%);
            color: white;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #heat-vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            box-shadow: inset 0 0 0px transparent;
            transition: box-shadow 0.8s ease;
        }

        .top-hud {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0,0,0,0.8);
            z-index: 9000;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .viewport-container {
            flex: 1;
            display: flex;
            position: relative;
            width: 100%;
            overflow: hidden;
            z-index: 10;
        }

        .ladder-track {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 92%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: var(--slot-gap);
            transform: translate(-50%, -50%);
            transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }

        @keyframes cardDropArrival {
            0% { transform: translateY(-800px) rotateX(-90deg); opacity: 0; }
            60% { transform: translateY(30px) rotateX(10deg); opacity: 1; }
            100% { transform: translateY(0) rotateX(0deg); opacity: 1; }
        }
        .animate-drop {
            animation: cardDropArrival 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        .heat-meter-container {
            position: absolute;
            right: 12px;
            top: 10%;
            bottom: 10%;
            width: 70px;
            z-index: 20;
            display: flex;
            justify-content: flex-end;
        }

        .heat-track-wrapper { height: 100%; width: 22px; position: relative; }
        .heat-track-bg { height: 100%; width: 100%; background: rgba(0, 0, 0, 0.8); border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 20px; position: absolute; box-shadow: 0 0 15px rgba(0,0,0,0.8); overflow: hidden; }
        .heat-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #ffbb00, #ff4800, #ff0000, #ffffff); background-size: 100% 400%; border-radius: 20px; transition: height 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 30px #ff4500; }
        
        .fire-marker { 
            position: absolute; 
            right: -12px; 
            transform: translateY(50%); 
            font-size: 44px; 
            transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.4s, filter 0.4s, transform 0.3s; 
            z-index: 35; 
        }

        /* Nuclear Animation triggers at 25X */
        .nuclear-active .fire-marker { animation: nuclearShake 0.1s infinite; }
        @keyframes nuclearShake { 0% { transform: translate(0, 50%) scale(1.4); } 50% { transform: translate(3px, 48%) scale(1.5); } 100% { transform: translate(-3px, 52%) scale(1.4); } }

        /* NOVA Animation for Flame */
        .nova-active .fire-marker { animation: novaSpin 0.5s infinite linear; }
        @keyframes novaSpin {
            0% { transform: translateY(50%) scale(2) rotate(0deg); }
            50% { transform: translateY(50%) scale(2.2) rotate(180deg); }
            100% { transform: translateY(50%) scale(2) rotate(360deg); }
        }

        .milestone { position: absolute; right: 28px; transform: translateY(50%); font-family: 'Orbitron'; font-size: 13px; font-weight: 900; color: rgba(255,255,255,0.3); transition: all 0.3s; white-space: nowrap; transform-origin: right center; }
        .milestone.active { color: white; transform: translateY(50%) scale(1.4); text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .milestone-safe { color: #4ade80 !important; opacity: 1; }

        .slot-container { height: var(--slot-h); perspective: 1000px; }
        .slot-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slot-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.3); transition: all 0.3s; }
        .slot-front { background: linear-gradient(180deg, #1e4d8c 0%, #0a2344 100%); justify-content: center; font-weight: 900; color: white; font-size: 2.2rem; }
        .slot-back { background: linear-gradient(180deg, #1a5fb4 0%, #0a3d82 100%); transform: rotateX(180deg); color: white; justify-content: space-between; border: 2px solid white; padding: 0; overflow: hidden; }
        
        @media (min-width: 640px) { .slot-front { font-size: 2.5rem; } }
        
        .active-slot { transform: scale(1.08); z-index: 50; }
        .slot-flipped .slot-inner { transform: rotateX(180deg); }
        .dimmed { opacity: 0.3; filter: grayscale(1); transform: scale(0.92); }
        
        .slot-strike-outline .slot-face { border: 4px solid var(--red) !important; box-shadow: 0 0 30px var(--red) !important; opacity: 0.8; }
        .strike-mark { position: absolute; inset: 0; width: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--red); font-weight: 900; border-left: 2px solid white; }
        .slot-strike-outline .strike-mark { display: flex; }

        @keyframes correctPulse {
            0% { box-shadow: 0 0 0px var(--gold); border-color: var(--gold); }
            50% { box-shadow: 0 0 50px var(--gold); border-color: white; }
            100% { box-shadow: 0 0 0px transparent; border-color: rgba(255,255,255,0.3); }
        }
        .correct-flash .slot-face { animation: correctPulse 0.8s ease-out; }

        .choice-hud { background: rgba(0,0,0,0.95); padding: 15px 15px 30px 15px; border-top: 2px solid rgba(255,255,255,0.2); position: relative; z-index: 100; perspective: 1000px; }
        .choice-btn { background: white; color: var(--dark-blue); height: 75px; border-radius: 16px; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; border: 4px solid transparent; transition: 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.4); }
        .btn-highlight { border-color: var(--gold) !important; transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }

        .controls-hidden { opacity: 0; transform: translateY(50px) rotateX(-30deg) scale(0.9); transition: all 0.3s ease-in; pointer-events: none; }
        .controls-visible { opacity: 1; transform: translateY(0) rotateX(0deg) scale(1); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: auto; }

        #bank-btn { opacity: 0; pointer-events: none; transform: scale(0.5); transform-origin: center; }
        @keyframes bankPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(34,197,94,0.5); } 50% { transform: scale(1.12); box-shadow: 0 0 40px rgba(74,222,128,1); background-color: #22c55e; } }
        .btn-nudge { animation: bankPulse 1.8s infinite ease-in-out; pointer-events: auto !important; opacity: 1 !important; }

        #start-screen, #victory-overlay, #confirm-modal { position: fixed; inset: 0; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; z-index: 9500; background: rgba(0, 0, 0, 0.96); backdrop-filter: blur(25px); display: none; }
        #start-screen { display: flex; background: linear-gradient(135deg, #001a35, #000000); }
        #strike-overlay { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; background: rgba(227, 24, 55, 0.95); z-index: 9999; }

        @keyframes unlockFlare { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }
        #unlock-flare { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; padding: 60px 0; background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.95), transparent); z-index: 9999; opacity: 0; pointer-events: none; display: none; align-items: center; justify-content: center; }
        #unlock-flare.show { display: flex; animation: unlockFlare 2.5s ease forwards; }

        #nuclear-hit { position: fixed; inset: 0; background: white; z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.1s; }

        /* NOVA EXPLOSION OVERLAY */
        .nova-shockwave { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 20px solid #ff4500; opacity: 0; }
        @keyframes shockwaveNova { 0% { width: 0; height: 0; opacity: 1; border-width: 60px; border-color: #ffffff; } 100% { width: 180vmax; height: 180vmax; opacity: 0; border-width: 0; border-color: #ff4500; } }
        @keyframes flashNova { 0% { opacity: 1; background: #ffffff; } 50% { opacity: 0.7; background: #ff4500; } 100% { opacity: 0; background: #000000; } }
        @keyframes textNova { 0% { transform: scale(0); opacity: 0; } 15% { transform: scale(1.1); opacity: 1; } 80% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        
        .nova-flash.active { animation: flashNova 1.5s ease-out forwards; }
        .nova-shockwave.active { animation: shockwaveNova 1.2s ease-out forwards; }
        .nova-text.active { animation: textNova 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .tally-row { display: flex; align-items: center; justify-content: center; gap: 1rem; opacity: 0; transform: translateY(20px); transition: 0.5s ease; margin: 10px 0; }
        .tally-row.show { opacity: 1; transform: translateY(0); }

        .flying-fire { position: fixed; z-index: 5500; color: #ff4500; font-size: 5rem; filter: drop-shadow(0 0 30px #ff0000); pointer-events: none; transition: 0.6s cubic-bezier(0.5, 0, 0.2, 1); }
        .flying-coin { position: fixed; z-index: 10000; color: var(--gold); font-size: 2.2rem; filter: drop-shadow(0 0 8px rgba(0,0,0,0.5)); pointer-events: none; transition: all 0.7s cubic-bezier(0.5, 0, 0.2, 1); }
    </style>
</head>
<body id="game-body">

    <!-- Explosion Elements -->
    <div id="nuclear-hit"></div>
    <div id="nova-explosion" class="pointer-events-none fixed inset-0 z-[9800] flex-col items-center justify-center" style="display: none;">
        <div class="nova-flash absolute inset-0 bg-white opacity-0"></div>
        <div class="nova-shockwave"></div>
        <h1 class="nova-text text-center font-black italic uppercase relative z-10 scale-0 opacity-0 leading-tight">
            <span class="text-white text-3xl sm:text-5xl drop-shadow-[0_0_20px_#ff0000]">Max Multiplier</span><br>
            <span id="nova-mult-val" class="text-gold text-8xl sm:text-9xl drop-shadow-[0_0_40px_#ff4500]">40X</span><br>
            <span class="text-white text-4xl sm:text-6xl drop-shadow-[0_0_20px_#ff0000]">Achieved!</span>
        </h1>
    </div>

    <div id="heat-vignette"></div>
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-[9999]"></canvas>
    <div id="status-label" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[5200] text-5xl font-black italic uppercase text-gold scale-0 transition-transform duration-300 pointer-events-none drop-shadow-2xl">Survey Says...</div>

    <div id="unlock-flare">
        <div class="text-center px-4">
            <h2 class="text-white text-5xl font-black italic uppercase tracking-tighter drop-shadow-lg">Cash Out Unlocked!</h2>
            <p class="text-green-300 text-lg font-bold uppercase mt-2">Safely Bank at any time</p>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h3 class="text-sky-400 text-xl font-bold uppercase tracking-[0.3em] mb-4">Gauntlet Length</h3>
        <h1 class="text-white text-6xl sm:text-7xl font-black uppercase italic mb-12 drop-shadow-[0_0_20px_rgba(79,179,255,0.4)]">Survey Streak</h1>
        <div class="grid grid-cols-2 gap-3 sm:gap-4 w-full max-w-sm px-4">
            <button onclick="pickLength(4)" class="bg-white/10 hover:bg-white/20 border-2 border-white/20 p-5 sm:p-6 rounded-2xl transition-all">
                <div class="text-4xl font-black text-white mb-1">4</div>
                <div class="text-[10px] uppercase font-bold text-white/40">Answers</div>
            </button>
            <button onclick="pickLength(5)" class="bg-white/10 hover:bg-white/20 border-2 border-white/20 p-5 sm:p-6 rounded-2xl transition-all">
                <div class="text-4xl font-black text-white mb-1">5</div>
                <div class="text-[10px] uppercase font-bold text-white/40">Answers</div>
            </button>
            <button onclick="pickLength(6)" class="bg-white/10 hover:bg-white/20 border-2 border-white/20 p-5 sm:p-6 rounded-2xl transition-all">
                <div class="text-4xl font-black text-white mb-1">6</div>
                <div class="text-[10px] uppercase font-bold text-white/40">Answers</div>
            </button>
            <button onclick="pickLength(8)" class="bg-navy border-2 border-sky-500 p-5 sm:p-6 rounded-2xl transition-all shadow-lg scale-105">
                <div class="text-4xl font-black text-white mb-1">8</div>
                <div class="text-[10px] uppercase font-bold text-sky-400">Standard</div>
            </button>
        </div>
    </div>

    <!-- Main Game HUD -->
    <div class="top-hud">
        <div>
            <span class="text-[8px] font-black opacity-50 block uppercase tracking-widest">Bank</span>
            <div class="flex items-center gap-1"><i id="hud-bank-icon" class="fa-solid fa-coins text-yellow-400 text-xs"></i><span id="bank-val" class="text-lg font-black text-yellow-400">0</span></div>
        </div>
        <div class="text-center">
            <span class="text-[8px] font-black opacity-50 block uppercase tracking-widest">Points</span>
            <span id="score-val" class="text-xl font-black text-white">0</span>
        </div>
        <div class="flex justify-end gap-1">
            <div class="w-6 h-6 border border-white rounded flex items-center justify-center text-xs font-bold" data-strike="1">X</div>
            <div class="w-6 h-6 border border-white rounded flex items-center justify-center text-xs font-bold" data-strike="2">X</div>
            <div class="w-6 h-6 border border-white rounded flex items-center justify-center text-xs font-bold" data-strike="3">X</div>
        </div>
    </div>

    <div class="viewport-container" id="game-view">
        <div id="ladder-track" class="ladder-track"></div>
        <div class="heat-meter-container" id="meter-box">
            <div id="milestones-list" class="milestone-labels h-full relative w-full"></div>
            <div class="heat-track-wrapper">
                <div class="heat-track-bg">
                    <div id="heat-fill" class="heat-fill"></div>
                </div>
                <div id="fire-marker" class="fire-marker" style="bottom: 0%;"><i id="main-fire-icon" class="fa-solid fa-fire"></i></div>
            </div>
        </div>
    </div>

    <div class="px-6 pb-4 relative z-50">
        <div id="q-box" class="bg-white rounded-2xl p-4 sm:p-6 shadow-2xl text-center border-b-8 border-gray-200">
            <h2 id="q-text" class="text-black text-xl sm:text-2xl font-black italic uppercase leading-tight tracking-tighter">Preparing...</h2>
        </div>
    </div>

    <div class="choice-hud relative z-[200]">
        <div id="controls" class="grid grid-cols-2 gap-4 controls-hidden">
            <button id="btn-0" class="choice-btn">---</button>
            <button id="btn-1" class="choice-btn">---</button>
        </div>
        <div class="flex justify-between items-center mt-5 relative">
            <div class="flex items-center gap-2 relative">
                <i class="fa-solid fa-shield-halved text-sky-400 text-sm" id="shield-icon"></i>
                <span id="shield-val" class="font-black text-sm">1</span>
            </div>
            <button onclick="showBankModal()" id="bank-btn" class="bg-green-600 px-6 py-2.5 rounded-full text-[10px] font-black uppercase border-2 border-green-400 shadow-lg">Bank & Exit</button>
            <div class="text-right">
                <span id="mult-text" class="font-black text-white text-3xl italic">1X</span>
            </div>
        </div>
    </div>

    <!-- Victory Overlay -->
    <div id="victory-overlay">
        <h3 id="victory-badge" class="text-yellow-400 text-2xl font-black italic mb-2 uppercase tracking-widest">Survey Says...</h3>
        <h2 id="victory-title" class="text-white text-5xl sm:text-6xl font-black mb-8 uppercase">Well Done</h2>
        <div class="bg-white/5 p-8 rounded-[2rem] border border-white/10 mb-10 w-full max-w-md shadow-2xl">
            <div class="tally-row show flex justify-between px-4"><span class="uppercase text-xs font-black opacity-50">Points</span><span id="tally-points" class="font-bold">0</span></div>
            <div class="tally-row show flex justify-between px-4 text-yellow-400"><span class="uppercase text-xs font-black">Multiplier</span><span id="tally-mult" class="font-bold">1x</span></div>
            <div class="h-px bg-white/10 my-4"></div>
            <div class="flex flex-col items-center">
                <div class="flex items-center gap-3 mb-2">
                    <i id="final-coin-icon" class="fa-solid fa-coins text-5xl sm:text-6xl text-yellow-400"></i>
                    <span id="final-win" class="text-6xl sm:text-7xl font-black text-yellow-400 drop-shadow-lg">0</span>
                </div>
            </div>
        </div>
        <button id="collect-btn" onclick="collectWinnings()" class="bg-yellow-400 text-navy px-20 py-6 rounded-full font-black text-3xl shadow-2xl transition-all duration-500 uppercase border-b-8 border-yellow-600 active:scale-95">Collect</button>
    </div>

    <div id="confirm-modal">
        <h3 class="text-gold text-3xl font-black mb-1 uppercase italic">Secure the Bag?</h3>
        <div class="bg-white/5 p-8 rounded-[2rem] border border-white/10 mb-10 w-full max-w-xs shadow-2xl">
            <div class="flex items-center justify-center gap-3 text-yellow-400">
                <i class="fa-solid fa-coins text-3xl"></i>
                <span id="modal-bank-val" class="text-5xl font-black">0</span>
            </div>
        </div>
        <button onclick="finishGame(true)" class="bg-green-500 text-white w-full py-5 rounded-full font-black uppercase text-xl mb-4 shadow-lg">Bank Now</button>
        <button onclick="hideBankModal()" class="text-white/40 uppercase text-xs font-black tracking-widest">Risk It</button>
    </div>

    <div id="strike-overlay">
        <i id="strike-icon" class="text-white text-[10rem] sm:text-[12rem] font-black italic mb-4">X</i>
        <h2 id="strike-title" class="text-white text-5xl font-black uppercase">Strike!</h2>
    </div>

    <script>
        const apiKey = "";
        
        const LADDER_PACING = {
            4: [1, 5, 10, 25, 40],
            5: [1, 3, 7, 15, 25, 40],
            6: [1, 2, 5, 10, 15, 25, 40],
            8: [1, 2, 3, 5, 7, 10, 15, 25, 40]
        };

        const FIRE_COLORS = ["#FFF75D", "#FFC11F", "#FE650D", "#F33C04", "#DA1F05", "#A10100", "#FFFFFF"];

        const SURVEY_DB = [
            { question: "Name a fruit people eat for breakfast", answers: [{text: "Banana", points: 40, distractor: "Pineapple"}, {text: "Orange", points: 30, distractor: "Lemon"}, {text: "Grapefruit", points: 15, distractor: "Lime"}, {text: "Apple", points: 10, distractor: "Plum"}, {text: "Melon", points: 3, distractor: "Mango"}, {text: "Grapes", points: 2, distractor: "Cherry"}, {text: "Peach", points: 1, distractor: "A Brick"}, {text: "Pear", points: 1, distractor: "A Chainsaw"}] },
            { question: "Name something people do before bed", answers: [{text: "Brush Teeth", points: 45, distractor: "Floss"}, {text: "Read", points: 25, distractor: "Journaling"}, {text: "Shower", points: 15, distractor: "Taking a Bath"}, {text: "Set Alarm", points: 8, distractor: "Checking Weather"}, {text: "Watch TV", points: 4, distractor: "Radio"}, {text: "Drink Water", points: 2, distractor: "Drink Milk"}, {text: "Pray", points: 1, distractor: "Lawn Mower"}, {text: "Lock Doors", points: 1, distractor: "Spaceship"}] },
            { question: "What might make a baby cry?", answers: [{text: "Hunger", points: 40, distractor: "Thirst"}, {text: "Dirty Diaper", points: 30, distractor: "Wet Socks"}, {text: "Tiredness", points: 15, distractor: "Boredom"}, {text: "Teething", points: 8, distractor: "Earache"}, {text: "Loud Noise", points: 3, distractor: "Bright Light"}, {text: "Gas", points: 2, distractor: "Hiccups"}, {text: "Colic", points: 1, distractor: "Taxes"}, {text: "Strangers", points: 1, distractor: "A Mortgage"}] },
            { question: "Name a useful kitchen appliance", answers: [{text: "Toaster", points: 35, distractor: "Blender"}, {text: "Microwave", points: 25, distractor: "Air Fryer"}, {text: "Coffee Maker", points: 15, distractor: "Juicer"}, {text: "Oven", points: 10, distractor: "Stove"}, {text: "Mixer", points: 5, distractor: "Grater"}, {text: "Waffle Iron", points: 3, distractor: "Pan"}, {text: "Fryer", points: 1, distractor: "Canoe"}, {text: "Slow Cooker", points: 1, distractor: "Ferrari"}] }
        ];

        let gameState = { bank: 0, roundBasePoints: 0, msIdx: 0, shields: 1, strikes: 0, slotIdx: 99, survey: null, processing: true, bankBtnRevealed: false, currentMilestones: [], ansCount: 8, nuclearTriggered: false, novaTriggered: false };

        function pickLength(count) {
            gameState.ansCount = count;
            document.getElementById('start-screen').style.display = 'none';
            startRound();
        }

        function setCamera(index) {
            const track = document.getElementById('ladder-track');
            if (!track) return;
            const rootStyles = getComputedStyle(document.documentElement);
            const slotH = parseInt(rootStyles.getPropertyValue('--slot-h')) || 65;
            const slotGap = parseInt(rootStyles.getPropertyValue('--slot-gap')) || 8;
            const offset = -(index * (slotH + slotGap));
            track.style.transform = `translate(-50%, ${offset}px)`;
        }

        window.addEventListener('resize', () => {
            if (!gameState.processing && gameState.slotIdx >= 0) {
                setCamera(gameState.slotIdx);
            }
        });

        function updateHeatUI() {
            const milestones = gameState.currentMilestones;
            const fill = document.getElementById('heat-fill');
            const fire = document.getElementById('main-fire-icon');
            const meterBox = document.getElementById('meter-box');
            const vignette = document.getElementById('heat-vignette');
            if (!fill || !fire || !vignette) return;

            const pct = (gameState.msIdx / (milestones.length - 1)) * 100;
            fill.style.height = pct + "%";
            document.getElementById('fire-marker').style.bottom = pct + "%";
            
            const colorStep = Math.min(gameState.msIdx, FIRE_COLORS.length - 1);
            const fireColor = FIRE_COLORS[colorStep];
            
            meterBox.classList.remove('nuclear-active', 'nova-active');
            
            if (gameState.msIdx === milestones.length - 1) {
                meterBox.classList.add('nova-active');
                fire.className = "fa-solid fa-sun";
                fire.style.color = "#FFFFFF";
                fire.style.filter = `drop-shadow(0 0 50px #ffffff) drop-shadow(0 0 80px #4fb3ff)`;
                vignette.style.boxShadow = `inset 0 0 150px rgba(255, 255, 255, 0.4)`;
            } else {
                fire.className = "fa-solid fa-fire";
                fire.style.color = fireColor;
                fire.style.filter = `drop-shadow(0 0 ${10 + (gameState.msIdx * 5)}px ${fireColor})`;

                if (milestones[gameState.msIdx] >= 15 || gameState.slotIdx === 0) {
                    meterBox.classList.add('nuclear-active');
                    vignette.style.boxShadow = `inset 0 0 ${pct * 2.5}px rgba(255, 69, 0, 0.3)`;
                } else {
                    vignette.style.boxShadow = `inset 0 0 ${pct * 2.5}px rgba(255, 69, 0, 0)`;
                }
            }

            document.querySelectorAll('.milestone').forEach((m, i) => m.classList.toggle('active', i === gameState.msIdx));
            document.getElementById('mult-text').innerText = milestones[gameState.msIdx] + "X";
        }

        async function startRound() {
            gameState.processing = true; 
            gameState.msIdx = 0; gameState.strikes = 0; gameState.roundBasePoints = 0; 
            gameState.bankBtnRevealed = false; gameState.nuclearTriggered = false; gameState.novaTriggered = false;
            gameState.slotIdx = gameState.ansCount - 1;
            gameState.currentMilestones = LADDER_PACING[gameState.ansCount];

            document.getElementById('victory-overlay').style.display = 'none';
            document.getElementById('confirm-modal').style.display = 'none';
            document.getElementById('bank-btn').style.opacity = '0';
            document.getElementById('bank-btn').className = "bg-green-600 px-6 py-2.5 rounded-full text-[10px] font-black uppercase border-2 border-green-400 shadow-lg";
            
            const controlsEl = document.getElementById('controls');
            controlsEl.classList.remove('controls-visible');
            controlsEl.classList.add('controls-hidden');
            document.getElementById('btn-0').classList.remove('btn-highlight');
            document.getElementById('btn-1').classList.remove('btn-highlight');

            updateUI(); 
            updateHeatUI();

            const randomSurvey = SURVEY_DB[Math.floor(Math.random() * SURVEY_DB.length)];
            const surveyCopy = JSON.parse(JSON.stringify(randomSurvey));
            surveyCopy.answers = surveyCopy.answers.slice(0, gameState.ansCount);
            initGame(surveyCopy);
        }

        function initGame(survey) {
            gameState.survey = survey;
            document.getElementById('q-text').innerText = survey.question;
            const track = document.getElementById('ladder-track');
            const msList = document.getElementById('milestones-list');
            track.innerHTML = ''; msList.innerHTML = '';
            
            gameState.currentMilestones.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'milestone';
                div.style.bottom = (i / (gameState.currentMilestones.length - 1) * 100) + "%";
                if (i === 1) { 
                    div.classList.add('milestone-safe'); 
                    div.innerHTML = `<i id="lock-icon" class="fa-solid fa-lock text-[10px] mr-1"></i>${m}X`; 
                } else { div.innerText = m + "X"; }
                msList.appendChild(div);
            });

            survey.answers.forEach((ans, i) => {
                const slot = document.createElement('div');
                slot.id = `slot-${i}`; 
                slot.className = `slot-container animate-drop dimmed`;
                slot.style.animationDelay = `${(survey.answers.length - i) * 0.12}s`;
                slot.innerHTML = `<div class="slot-inner"><div class="slot-face slot-front">${i+1}</div><div class="slot-face slot-back"><span class="px-4 sm:px-8 font-black text-lg sm:text-2xl uppercase truncate">${ans.text}</span><div class="h-full w-12 sm:w-16 bg-navy flex items-center justify-center border-l-2 border-white relative text-xl sm:text-2xl font-bold"><span class="pts-val">${ans.points}</span><div class="strike-mark">X</div></div></div></div>`;
                track.appendChild(slot);
            });

            setCamera(0);
            setTimeout(() => {
                setCamera(gameState.slotIdx);
                refreshSlots();
                updateChoices();
                const controlsEl = document.getElementById('controls');
                controlsEl.classList.remove('controls-hidden');
                controlsEl.classList.add('controls-visible');
                gameState.processing = false;
            }, 1500); 
        }

        function refreshSlots() {
            document.querySelectorAll('.slot-container').forEach((s, i) => {
                s.classList.toggle('active-slot', i === gameState.slotIdx);
                if (gameState.slotIdx >= 0) s.classList.toggle('dimmed', i < gameState.slotIdx);
            });
        }

        function updateChoices() {
            const curr = gameState.survey.answers[gameState.slotIdx];
            const isL = Math.random() > 0.5;
            const b0 = document.getElementById('btn-0'), b1 = document.getElementById('btn-1');
            b0.innerText = isL ? curr.text : curr.distractor; b1.innerText = isL ? curr.distractor : curr.text;
            b0.onclick = () => handleChoice(0, isL); b1.onclick = () => handleChoice(1, !isL);
        }

        async function handleChoice(idx, correct) {
            if (gameState.processing) return; gameState.processing = true;
            document.getElementById(`btn-${idx}`).classList.add('btn-highlight');
            const lbl = document.getElementById('status-label');
            lbl.style.transform = "translate(-50%, -50%) scale(1)"; await wait(800); lbl.style.transform = "translate(-50%, -50%) scale(0)";
            
            const slotEl = document.getElementById(`slot-${gameState.slotIdx}`);
            let isShielded = false;

            const controlsEl = document.getElementById('controls');
            controlsEl.classList.remove('controls-visible');
            controlsEl.classList.add('controls-hidden');

            if (correct) {
                if (gameState.slotIdx === 0) triggerNuclearHit();
                slotEl.classList.add('correct-flash');
                gameState.roundBasePoints += gameState.survey.answers[gameState.slotIdx].points;
            } else {
                slotEl.classList.add('slot-strike-outline');
                isShielded = await triggerStrike();
            }
            
            slotEl.classList.add('slot-flipped');
            if (correct) {
                await wait(600); await animateFlyingFire();
                gameState.msIdx = Math.min(gameState.currentMilestones.length - 1, gameState.msIdx + 1);
                updateHeatUI();
                
                // NOVA EXPLOSION TRIGGER
                if (gameState.msIdx === gameState.currentMilestones.length - 1 && !gameState.novaTriggered) {
                    gameState.novaTriggered = true;
                    triggerNovaExplosion();
                    await wait(3000); // Let the explosion breathe before moving on
                } else {
                    await wait(800);
                    if (gameState.msIdx === 1 && !gameState.bankBtnRevealed) triggerCashoutUnlock();
                }
            } else if (!isShielded) {
                await wait(600); await animateFlyingIce();
                gameState.msIdx = Math.max(0, gameState.msIdx - 1);
                updateHeatUI();
            }
            
            gameState.slotIdx--; updateUI();
            if (gameState.slotIdx >= 0 && gameState.strikes < 3) {
                await wait(400); setCamera(gameState.slotIdx); refreshSlots(); updateChoices();
                document.getElementById('btn-0').classList.remove('btn-highlight');
                document.getElementById('btn-1').classList.remove('btn-highlight');
                controlsEl.classList.remove('controls-hidden');
                controlsEl.classList.add('controls-visible');
                gameState.processing = false;
            } else {
                await wait(800); finishGame(false);
            }
        }

        function triggerNuclearHit() {
            const hit = document.getElementById('nuclear-hit');
            hit.style.opacity = '1';
            document.body.classList.add('screen-shake');
            setTimeout(() => { hit.style.opacity = '0'; }, 200);
        }

        function triggerNovaExplosion() {
            const exp = document.getElementById('nova-explosion');
            document.getElementById('nova-mult-val').innerText = gameState.currentMilestones[gameState.msIdx] + "X";
            exp.style.display = 'flex';
            document.body.classList.add('screen-shake');
            
            const text = exp.querySelector('.nova-text');
            const flash = exp.querySelector('.nova-flash');
            const wave = exp.querySelector('.nova-shockwave');

            text.classList.remove('active');
            flash.classList.remove('active');
            wave.classList.remove('active');
            
            void exp.offsetWidth; // Reflow

            text.classList.add('active');
            flash.classList.add('active');
            wave.classList.add('active');

            startConfetti(400);

            setTimeout(() => {
                document.body.classList.remove('screen-shake');
                exp.style.display = 'none';
            }, 3000);
        }

        function triggerCashoutUnlock() {
            if (gameState.bankBtnRevealed) return;
            gameState.bankBtnRevealed = true;
            
            const lockIcon = document.getElementById('lock-icon');
            if (lockIcon) {
                lockIcon.className = "fa-solid fa-unlock text-[10px] mr-1 text-green-300 transform scale-150 transition-all";
                setTimeout(() => lockIcon.style.opacity = '0', 1000);
            }

            const flare = document.getElementById('unlock-flare');
            flare.classList.add('show');
            const btn = document.getElementById('bank-btn');
            btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; btn.classList.add('btn-nudge');
            setTimeout(() => flare.classList.remove('show'), 2500);
        }

        async function triggerStrike() {
            const ov = document.getElementById('strike-overlay'); const icon = document.getElementById('strike-icon');
            let isShielded = false;
            ov.style.display = 'flex'; document.body.classList.add('screen-shake');
            if (gameState.shields > 0) {
                await wait(600); ov.style.backgroundColor = "rgba(0, 132, 255, 0.95)"; icon.className = "fa-solid fa-shield-halved text-white text-[10rem] sm:text-[12rem] mb-4";
                gameState.shields--; isShielded = true;
            } else { gameState.strikes++; }
            updateUI(); await wait(1200); ov.style.display = 'none'; ov.style.backgroundColor = ""; document.body.classList.remove('screen-shake'); return isShielded;
        }

        async function animateFlyingFire() {
            return new Promise(resolve => {
                const fire = document.createElement('i'); fire.className = 'fa-solid fa-fire flying-fire'; fire.style.left = '50%'; fire.style.top = '45%'; fire.style.transform = 'translate(-50%, -50%) scale(0)'; document.body.appendChild(fire);
                const target = document.getElementById('main-fire-icon');
                const rect = target.getBoundingClientRect();
                requestAnimationFrame(() => { fire.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    setTimeout(() => { fire.style.left = (rect.left + rect.width / 2) + 'px'; fire.style.top = (rect.top + rect.height / 2) + 'px'; fire.style.transform = 'translate(-50%, -50%) scale(0.5)'; fire.style.opacity = '0'; 
                    setTimeout(() => { fire.remove(); resolve(); }, 600); }, 400);
                });
            });
        }

        async function animateFlyingIce() {
            return new Promise(resolve => {
                const ice = document.createElement('i'); ice.className = 'fa-solid fa-snowflake flying-ice'; ice.style.left = '50%'; ice.style.top = '45%'; ice.style.transform = 'translate(-50%, -50%) scale(0)'; document.body.appendChild(ice);
                const target = document.getElementById('main-fire-icon');
                const rect = target.getBoundingClientRect();
                requestAnimationFrame(() => { ice.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    setTimeout(() => { ice.style.left = (rect.left + rect.width / 2) + 'px'; ice.style.top = (rect.top + rect.height / 2) + 'px'; ice.style.transform = 'translate(-50%, -50%) scale(0.5)'; ice.style.opacity = '0'; 
                    setTimeout(() => { ice.remove(); resolve(); }, 600); }, 400);
                });
            });
        }

        function updateUI() {
            document.getElementById('score-val').innerText = gameState.roundBasePoints;
            document.getElementById('bank-val').innerText = gameState.bank.toLocaleString();
            document.getElementById('shield-val').innerText = gameState.shields;
            for (let i = 1; i <= 3; i++) {
                const el = document.querySelector(`[data-strike="${i}"]`);
                if (el) el.style.backgroundColor = gameState.strikes >= i ? "var(--red)" : "transparent";
            }
        }

        function showBankModal() {
            if (gameState.processing) return;
            document.getElementById('modal-bank-val').innerText = (gameState.roundBasePoints * gameState.currentMilestones[gameState.msIdx]).toLocaleString();
            document.getElementById('confirm-modal').style.display = 'flex';
        }

        function hideBankModal() { document.getElementById('confirm-modal').style.display = 'none'; }

        async function finishGame(isCashingOut) {
            gameState.processing = true; hideBankModal();
            const controlsEl = document.getElementById('controls');
            controlsEl.classList.remove('controls-visible');
            controlsEl.classList.add('controls-hidden');
            
            for (let i = gameState.slotIdx; i >= 0; i--) {
                const slot = document.getElementById(`slot-${i}`);
                if (slot && !slot.classList.contains('slot-flipped')) {
                    slot.classList.add('slot-flipped'); slot.classList.remove('dimmed'); setCamera(i); await wait(500); 
                }
            }
            await wait(1000);

            const isLoss = gameState.strikes >= 3;
            const topSlot = document.getElementById('slot-0');
            const isPerfect = gameState.slotIdx < 0 && topSlot && topSlot.classList.contains('correct-flash') && !isLoss && !isCashingOut;
            const ov = document.getElementById('victory-overlay');
            const title = document.getElementById('victory-title');
            
            if (isPerfect) { title.innerText = "Supreme Streak!"; title.style.color = "#00f2ff"; }
            else { title.innerText = "Well Done"; title.style.color = "white"; if (gameState.roundBasePoints > 0) startConfetti(80); }
            
            ov.style.display = 'flex';
            document.getElementById('tally-points').innerText = gameState.roundBasePoints;
            document.getElementById('tally-mult').innerText = gameState.currentMilestones[gameState.msIdx] + "x";
            document.getElementById('final-win').innerText = (gameState.roundBasePoints * gameState.currentMilestones[gameState.msIdx]).toLocaleString();
            const btn = document.getElementById('collect-btn'); btn.style.opacity = '1'; btn.style.transform = 'scale(1)'; btn.style.pointerEvents = 'auto';
        }

        async function collectWinnings() {
            const collectBtn = document.getElementById('collect-btn');
            collectBtn.style.pointerEvents = 'none'; 
            collectBtn.style.opacity = '0.5';

            const amount = (gameState.roundBasePoints * gameState.currentMilestones[gameState.msIdx]);
            if (amount > 0) {
                const sourceRect = document.getElementById('final-coin-icon').getBoundingClientRect();
                const targetRect = document.getElementById('hud-bank-icon').getBoundingClientRect();
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const coin = document.createElement('i'); coin.className = 'fa-solid fa-coins flying-coin';
                        coin.style.left = (sourceRect.left + 20) + 'px'; coin.style.top = sourceRect.top + 'px';
                        document.body.appendChild(coin);
                        requestAnimationFrame(() => { requestAnimationFrame(() => {
                            coin.style.left = targetRect.left + 'px'; coin.style.top = targetRect.top + 'px';
                            coin.style.transform = 'scale(0.4)'; coin.style.opacity = '0';
                        }); });
                        setTimeout(() => coin.remove(), 700);
                    }, i * 50);
                }
                await wait(1500);
                gameState.bank += amount;
                updateUI();
            }
            document.getElementById('victory-overlay').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        }

        const wait = ms => new Promise(res => setTimeout(res, ms));
        function startConfetti(count) {
            const COLORS = ['#ffbb00','#fff','#00f2ff','#ff4800'];
            const canvas = document.getElementById('confetti-canvas'); 
            const ctx = canvas.getContext('2d'); 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let parts = Array.from({length: count}, () => ({ 
                x: Math.random()*canvas.width, y:-20, s:Math.random()*8+4, 
                c: COLORS[Math.floor(Math.random()*COLORS.length)], 
                vy:Math.random()*4+2, vx:Math.random()*2-1 
            }));
            function anim(){ 
                ctx.clearRect(0,0,canvas.width,canvas.height); 
                parts.forEach(p => { p.y+=p.vy; p.x+=p.vx; ctx.fillStyle=p.c; ctx.fillRect(p.x,p.y,p.s,p.s); }); 
                parts = parts.filter(p => p.y < canvas.height); 
                if(parts.length) requestAnimationFrame(anim); 
            }
            anim();
        }
    </script>
</body>
</html>
