<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep or Pass - Final Polished Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #121212; --accent: #fbc531; --strike-red: #ff3f34; --pass-green: #2ecc71;
            --feud-blue: #003399; --card-w: 240px; --card-h: 110px;
            --slot-blue: #0b4a91;
        }

        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; overflow: hidden; }

        #game-container {
            width: 375px; height: 667px; background: var(--bg); border-radius: 40px; position: relative;
            display: flex; flex-direction: column; border: 4px solid #333; overflow: hidden;
        }

        /* STRIKE OVERLAY */
        .full-overlay {
            position: absolute; inset: 0; z-index: 2000; display: none;
            justify-content: center; align-items: center; pointer-events: none;
            flex-direction: column; font-size: 80px; font-weight: 900; text-align: center;
        }
        #strike-overlay { background: rgba(255, 0, 0, 0.5); color: white; -webkit-text-stroke: 3px var(--strike-red); }

        /* HEADER */
        .header { width: 100%; padding: 20px 0 5px; display: flex; flex-direction: column; align-items: center; }
        #score-display { color: #fff; font-size: 48px; font-weight: 900; margin: 0; text-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        #strike-icons { display: flex; gap: 8px; margin-top: 5px; }
        .strike-x { color: #222; font-size: 24px; font-weight: 900; }
        .strike-x.active { color: var(--strike-red); text-shadow: 0 0 10px var(--strike-red); }

        #question-text { text-align: center; color: #fff; font-size: 13px; margin: 5px 25px 10px; text-transform: uppercase; min-height: 40px; display: flex; align-items: center; justify-content: center; font-weight: 900; line-height: 1.2; }

        /* BOARD */
        .board { 
            width: 90%; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            z-index: 10; 
            padding: 8px;
            background: #000;
            border: 3px solid #d48b1d; 
            border-radius: 12px;
        }

        .slot { height: 42px; perspective: 1000px; }
        .slot-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .slot.flipped .slot-inner { transform: rotateX(180deg); }
        .slot-front, .slot-back { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            -webkit-backface-visibility: hidden; 
            backface-visibility: hidden; 
            display: flex; 
            align-items: center; 
            box-sizing: border-box; 
            border-radius: 4px; 
        }
        
        .slot-front { 
            background: linear-gradient(180deg, #16367a 0%, #0a1b4d 100%); 
            border: 2px solid #3e5ea1;
            color: #fff; 
            justify-content: center; 
        }

        .slot-rank-orb {
            background: radial-gradient(circle, #2d6cd1 0%, #0b4a91 100%);
            border: 2px solid #fff;
            width: 45px;
            height: 24px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .slot-back { 
            background: white; 
            color: #000; 
            transform: rotateX(180deg); 
            justify-content: space-between; 
            padding: 0 12px;
        }
        .slot.missed .slot-back { background: #2a2a2a; color: #555; border: 1px solid #333; }
        
        .slot-text { text-transform: uppercase; font-size: 12px; font-weight: 900; flex-grow: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .slot-val { font-size: 14px; font-weight: 900; color: var(--feud-blue); border-left: 2px solid #ccc; padding-left: 8px; }
        .slot.missed .slot-val { color: #444; border-left-color: #444; }

        /* DECK AREA */
        #deck-area { position: absolute; bottom: 65px; left: 0; width: 100%; height: 120px; display: flex; justify-content: center; align-items: center; }
        .stack-item { position: absolute; width: var(--card-w); height: var(--card-h); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-transform: uppercase; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        
        .card.active { background: white; color: #121212; z-index: 100; cursor: grab; touch-action: none; }
        .card.peek-1 { background: #e0e0e0; transform: translateY(8px) scale(0.96); z-index: 90; }
        .card.peek-2 { background: #bcbcbc; transform: translateY(16px) scale(0.92); z-index: 80; }

        @keyframes dealIn {
            from { transform: translateY(300px) scale(0.5); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .dealing { animation: dealIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .pulse-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; pointer-events: none; position: relative; }
        .card-counter { position: absolute; bottom: 8px; font-size: 11px; font-weight: 900; color: #121212; opacity: 0.9; letter-spacing: 1px; background: rgba(0,0,0,0.08); padding: 2px 10px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); }

        @keyframes warningBlink { 50% { color: var(--strike-red); transform: scale(1.1); opacity: 1; background: rgba(255,0,0,0.1); } }
        .card-counter.warning { animation: warningBlink 0.6s ease-in-out infinite; color: var(--strike-red); opacity: 1; }

        @keyframes heartbeat { 
            0% { transform: scale(1); box-shadow: 0 0 0px var(--accent); } 
            50% { transform: scale(1.06); box-shadow: 0 0 20px var(--accent); } 
            100% { transform: scale(1); box-shadow: 0 0 0px var(--accent); } 
        }
        .pulse .pulse-wrapper { animation: heartbeat 0.8s infinite ease-in-out; background: rgba(251, 197, 49, 0.1); }

        #instruction-footer { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 9px; color: #555; font-weight: 900; text-transform: uppercase; }

        /* END SCREEN */
        #end-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.96); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; padding: 20px; text-align: center; }
        .final-score-hero { font-size: 64px; color: var(--accent); margin: 10px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 85%; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        .stat-box { display: flex; flex-direction: column; font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-val-small { font-size: 18px; color: #fff; font-weight: 900; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="strike-overlay" class="full-overlay">X<div style="font-size: 22px; -webkit-text-stroke: 0; margin-top: 12px; text-transform: uppercase;">INCORRECT</div></div>
    
    <div class="header">
        <div id="score-display">0</div>
        <div id="strike-icons"><span class="strike-x">X</span><span class="strike-x">X</span><span class="strike-x">X</span></div>
    </div>

    <div id="question-text">LOADING...</div>
    
    <div class="board" id="board">
        <div class="slot" id="s1"><div class="slot-inner"><div class="slot-front"><div class="slot-rank-orb">1</div></div><div class="slot-back"><span class="slot-text"></span><span class="slot-val">40</span></div></div></div>
        <div class="slot" id="s2"><div class="slot-inner"><div class="slot-front"><div class="slot-rank-orb">2</div></div><div class="slot-back"><span class="slot-text"></span><span class="slot-val">25</span></div></div></div>
        <div class="slot" id="s3"><div class="slot-inner"><div class="slot-front"><div class="slot-rank-orb">3</div></div><div class="slot-back"><span class="slot-text"></span><span class="slot-val">15</span></div></div></div>
        <div class="slot" id="s4"><div class="slot-inner"><div class="slot-front"><div class="slot-rank-orb">4</div></div><div class="slot-back"><span class="slot-text"></span><span class="slot-val">10</span></div></div></div>
        <div class="slot" id="s5"><div class="slot-inner"><div class="slot-front"><div class="slot-rank-orb">5</div></div><div class="slot-back"><span class="slot-text"></span><span class="slot-val">5</span></div></div></div>
    </div>

    <div id="deck-area"></div>
    <div id="instruction-footer">Swipe Up to Keep • Swipe Down to Pass</div>

    <div id="end-screen">
        <h1 id="completion-msg" style="letter-spacing: 4px; color: #fff; margin: 0;">SURVEY ENDED</h1>
        <div class="final-score-hero" id="final-points">0</div>
        <div class="stats-grid">
            <div class="stat-box"><span>Answers Found</span><span class="stat-val-small" id="stat-found">0/5</span></div>
            <div class="stat-box"><span>Decoys Dodged</span><span class="stat-val-small" id="stat-dodged">0/4</span></div>
            <div class="stat-box"><span>Points Missed</span><span class="stat-val-small" id="stat-missed">0</span></div>
            <div class="stat-box"><span>Accuracy</span><span class="stat-val-small" id="stat-acc">0%</span></div>
        </div>
        <button onclick="initGame()" style="padding: 15px 40px; background: var(--accent); border: none; font-weight: bold; border-radius: 15px; cursor:pointer; margin-top:25px;">NEXT SURVEY</button>
    </div>
</div>

<script>
    const database = [
        { q: "Name a reason someone skips a party.", answers: { "SICK": 1, "TIRED": 2, "WORK": 3, "NO BABYSITTER": 4, "NO OUTFIT": 5 }, decoys: ["TRAFFIC", "WEATHER", "FORGOT", "LATE"] },
        { q: "Name something expensive at the store.", answers: { "JEWELRY": 1, "ELECTRONICS": 2, "MEAT": 3, "FURNITURE": 4, "APPLIANCES": 5 }, decoys: ["SHOES", "CLOTHES", "TOOLS", "SPORTS GEAR"] },
        { q: "Name something in a glove compartment.", answers: { "MANUAL": 1, "INSURANCE": 2, "REGISTRATION": 3, "NAPKINS": 4, "FLASHLIGHT": 5 }, decoys: ["MAPS", "COINS", "TOOLS", "TIRE GAUGE"] },
        { q: "Name a place where people must be quiet.", answers: { "LIBRARY": 1, "CHURCH": 2, "THEATER": 3, "HOSPITAL": 4, "CLASSROOM": 5 }, decoys: ["COURTROOM", "SPA", "FUNERAL", "MUSEUM"] },
        { q: "Name something found in a desk drawer.", answers: { "PENS": 1, "PAPER": 2, "STAPLER": 3, "TAPE": 4, "PAPERCLIPS": 5 }, decoys: ["SCISSORS", "CALCULATOR", "SNACK", "CHARGER"] },
        { q: "Name a job that requires a uniform.", answers: { "POLICE": 1, "NURSE": 2, "SOLDIER": 3, "CHEF": 4, "PILOT": 5 }, decoys: ["FIREFIGHTER", "WAITER", "MECHANIC", "SECURITY"] },
        { q: "Name a common wedding gift.", answers: { "CASH": 1, "TOWELS": 2, "TOASTER": 3, "DISHES": 4, "BLENDER": 5 }, decoys: ["VACUUM", "LINENS", "KNIVES", "FRAME"] },
        { q: "Name something people do when bored.", answers: { "WATCH TV": 1, "SLEEP": 2, "EAT": 3, "READ": 4, "PHONE": 5 }, decoys: ["CLEAN", "WALK", "GAMING", "MUSIC"] },
        { q: "Name something found in a bakery.", answers: { "BREAD": 1, "CAKE": 2, "COOKIES": 3, "PASTRIES": 4, "DONUTS": 5 }, decoys: ["MUFFINS", "PIE", "FLOUR", "COFFEE"] },
        { q: "Name a reason people wake up early.", answers: { "WORK": 1, "SCHOOL": 2, "EXERCISE": 3, "TRAVEL": 4, "ALARM": 5 }, decoys: ["BABY", "PET", "HUNGER", "LIGHT"] }
    ];

    let currentQuestion, deck, strikes, currentIdx, found, currentScore, dodgedCount, missedPoints, pulseTimer;
    const pointValues = [40, 25, 15, 10, 5];

    async function initGame() {
        document.getElementById('end-screen').style.display = 'none';
        document.querySelectorAll('.strike-x').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.slot').forEach(s => { s.classList.remove('flipped', 'missed'); s.querySelector('.slot-text').innerText = ''; });
        
        currentQuestion = database[Math.floor(Math.random() * database.length)];
        document.getElementById('question-text').innerText = `"${currentQuestion.q}"`;
        
        const allDecoys = currentQuestion.decoys.slice(0, 4);
        deck = [...Object.keys(currentQuestion.answers), ...allDecoys].sort(() => Math.random() - 0.5);
        
        strikes = 0; currentIdx = 0; found = 0; currentScore = 0; dodgedCount = 0; missedPoints = 0;
        updateUI();
        await introSequence();
    }

    async function introSequence() {
        const deckArea = document.getElementById('deck-area');
        deckArea.innerHTML = '';
        for(let i=0; i<3; i++) {
            const d = document.createElement('div');
            d.className = 'stack-item card dealing';
            d.style.background = i === 2 ? 'white' : (i === 1 ? '#e0e0e0' : '#bcbcbc');
            d.style.zIndex = (i + 1) * 10;
            d.style.animationDelay = (i * 0.1) + 's';
            deckArea.appendChild(d);
        }
        await new Promise(r => setTimeout(r, 600));
        renderStack();
    }

    function renderStack() {
        const deckArea = document.getElementById('deck-area');
        deckArea.innerHTML = '';
        if (currentIdx + 2 < deck.length) {
            const p2 = createCard(deck[currentIdx + 2], 'peek-2', currentIdx + 3); deckArea.appendChild(p2);
        }
        if (currentIdx + 1 < deck.length) {
            const p1 = createCard(deck[currentIdx + 1], 'peek-1', currentIdx + 2); deckArea.appendChild(p1);
        }
        if (currentIdx < deck.length) {
            const a = createCard(deck[currentIdx], 'active', currentIdx + 1);
            deckArea.appendChild(a);
            initDrag(a);
        }
    }

    function createCard(text, type, num) {
        const d = document.createElement('div'); d.className = `stack-item card ${type}`;
        const isWarning = num >= 7;
        d.innerHTML = `
            <div class="pulse-wrapper">
                <div style="font-size:18px; font-weight:900; text-align:center; padding:0 15px;">${text}</div>
                <div class="card-counter ${isWarning ? 'warning' : ''}">${num} / 9</div>
            </div>`;
        return d;
    }

    function initDrag(el) {
        let x = 0, y = 0;
        const startHold = () => {
            clearTimeout(pulseTimer);
            pulseTimer = setTimeout(() => el.classList.add('pulse'), 1500); 
        };
        const endHold = () => {
            clearTimeout(pulseTimer);
            el.classList.remove('pulse');
        };

        el.addEventListener('pointerdown', startHold);
        window.addEventListener('pointerup', endHold);

        interact(el).draggable({
            listeners: {
                move(e) { 
                    endHold();
                    x += e.dx; y += e.dy; 
                    e.target.style.transform = `translate(${x}px, ${y}px) rotate(${x/15}deg)`; 
                },
                end(e) {
                    endHold();
                    if (y < -80) resolve(true, e.target);
                    else if (y > 80) resolve(false, e.target);
                    else { e.target.style.transition = 'transform 0.2s'; e.target.style.transform = `translate(0,0)`; x = 0; y = 0; }
                }
            }
        });
    }

    function resolve(isKeep, cardEl) {
        const val = cardEl.querySelector('.pulse-wrapper div').innerText;
        const rank = currentQuestion.answers[val];
        const deckArea = document.getElementById('deck-area');
        const deckRect = deckArea.getBoundingClientRect();

        if (isKeep) {
            if (rank) {
                const points = pointValues[rank-1];
                const slot = document.getElementById(`s${rank}`);
                slot.querySelector('.slot-text').innerText = val;
                
                const slotRect = slot.getBoundingClientRect();
                
                // FIXED COORDINATES: Relative to the card's original center in the deck area
                // slotCenter - deckAreaCenter
                const targetX = (slotRect.left + slotRect.width / 2) - (deckRect.left + deckRect.width / 2);
                const targetY = (slotRect.top + slotRect.height / 2) - (deckRect.top + deckRect.height / 2);
                
                cardEl.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                cardEl.style.transform = `translate(${targetX}px, ${targetY}px) scale(0.1) rotate(0deg)`;
                cardEl.style.opacity = '0';
                
                setTimeout(() => {
                    slot.classList.add('flipped');
                    const intensity = rank <= 2 ? 1.5 : 0.6;
                    confetti({ particleCount: 40 * intensity, spread: 60 * intensity, origin: { y: slotRect.top / window.innerHeight, x: slotRect.left / window.innerWidth }, colors: ['#ffffff', '#fbc531'] });
                }, 200);
                
                currentScore += points; found++; updateUI();
                if (found === 5) { setTimeout(endGame, 500); } else { setTimeout(nextCard, 450); }
            } else {
                triggerStrike(cardEl);
            }
        } else {
            if (rank) missedPoints += pointValues[rank-1];
            cardEl.style.transition = 'all 0.3s ease-in';
            cardEl.style.transform = 'translateY(500px) rotate(-10deg)';
            cardEl.style.opacity = '0';
            if (!rank) dodgedCount++;
            updateUI(); nextCard();
        }
    }

    function triggerStrike(cardEl) {
        strikes++;
        cardEl.style.transition = 'all 0.3s ease-in';
        cardEl.style.transform = 'translateY(-500px)';
        cardEl.style.opacity = '0';
        document.getElementById('strike-overlay').style.display = 'flex';
        setTimeout(() => { document.getElementById('strike-overlay').style.display = 'none'; }, 800);
        updateStrikeIcons();
        nextCard();
    }

    function updateUI() {
        document.getElementById('score-display').innerText = currentScore;
        const icons = document.querySelectorAll('.strike-x');
        if (strikes > 0 && strikes <= 3) icons[strikes - 1].classList.add('active');
    }

    function updateStrikeIcons() { 
        const icons = document.querySelectorAll('.strike-x'); 
        if (strikes > 0 && strikes <= 3) icons[strikes - 1].classList.add('active'); 
    }
    
    function nextCard() {
        currentIdx++;
        if (found === 5 || strikes >= 3 || currentIdx >= deck.length) setTimeout(endGame, 1000);
        else renderStack();
    }

    function endGame() {
        document.getElementById('deck-area').innerHTML = '';
        Object.keys(currentQuestion.answers).forEach((ans, index) => {
            const rank = currentQuestion.answers[ans];
            const slot = document.getElementById(`s${rank}`);
            if (!slot.classList.contains('flipped')) {
                slot.querySelector('.slot-text').innerText = ans;
                slot.classList.add('missed');
                setTimeout(() => slot.classList.add('flipped'), index * 100);
            }
        });

        if (found === 5) confetti({ particleCount: 150, spread: 180, origin: { y: 0.6 } });

        setTimeout(() => {
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('final-points').innerText = currentScore;
            document.getElementById('stat-found').innerText = `${found}/5`;
            
            // Logic Fix: Only count decoys dodged out of those seen
            // However, to make 5/5 perfect, we use decisions made
            document.getElementById('stat-dodged').innerText = `${dodgedCount}/4`;
            document.getElementById('stat-missed').innerText = missedPoints;
            
            // Accuracy Logic Fix: Correct decisions / Total interacted cards
            const interactedCards = Math.min(currentIdx, 9);
            const accuracy = Math.round(((found + dodgedCount) / interactedCards) * 100);
            document.getElementById('stat-acc').innerText = accuracy + "%";
        }, 1500);
    }

    initGame();
</script>
</body>
</html>
