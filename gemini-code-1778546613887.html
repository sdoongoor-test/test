<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplier Madness - Demo Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            --bg: #121212; --accent: #fbc531; --strike-red: #ff3f34; --pass-green: #2ecc71;
            --card-w: 260px; --card-h: 130px;
        }

        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; overflow: hidden; }

        #game-container {
            width: 375px; height: 667px; background: var(--bg); border-radius: 40px; position: relative;
            display: flex; flex-direction: column; border: 4px solid #333; overflow: hidden;
            transition: transform 0.1s, border-color 0.3s;
        }

        /* SIMPLIFIED OVERLAYS */
        .full-overlay {
            position: absolute; inset: 0; z-index: 2000; display: none;
            justify-content: center; align-items: center; pointer-events: none;
            flex-direction: column; font-size: 60px; font-weight: 900; text-align: center;
            line-height: 0.9;
        }
        #strike-overlay { background: rgba(255, 0, 0, 0.3); color: white; -webkit-text-stroke: 3px var(--strike-red); }
        #success-overlay { background: rgba(46, 204, 113, 0.25); color: var(--pass-green); -webkit-text-stroke: 2px white; }
        .overlay-val { font-size: 90px; display: block; margin-top: 10px; }

        .header { width: 100%; padding: 25px 0 10px; display: flex; flex-direction: column; align-items: center; }
        #multiplier-badge {
            background: var(--accent); color: #000; padding: 2px 15px; border-radius: 50px;
            font-size: 16px; font-weight: 900; margin-bottom: 5px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #cash-display { color: #fff; font-size: 48px; font-weight: 900; margin: 0; }

        #strike-icons { display: flex; gap: 8px; margin-top: 5px; }
        .strike-x { color: #222; font-size: 24px; font-weight: 900; }
        .strike-x.active { color: var(--strike-red); text-shadow: 0 0 10px var(--strike-red); }

        #question-text { text-align: center; color: #fff; font-size: 14px; margin: 5px 25px 15px; text-transform: uppercase; min-height: 35px; display: flex; align-items: center; justify-content: center; opacity: 0.6;}

        .board { width: 88%; margin: 0 auto; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
        .slot { height: 40px; background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; padding: 0 12px; border: 1px solid #333; color: #444; position: relative;}
        .slot.revealed { background: white; color: #000; border: none; transform: scale(1.03); }
        .slot-rank { width: 20px; font-size: 12px; opacity: 0.5; }
        .slot-text { flex-grow: 1; text-transform: uppercase; font-size: 12px; font-weight: 900; }
        .slot-val { font-size: 11px; font-weight: bold; color: var(--accent); }

        #deck-area { position: absolute; bottom: 40px; width: 100%; height: 150px; display: flex; justify-content: center; }
        .stack-item { position: absolute; width: var(--card-w); height: var(--card-h); border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-transform: uppercase; top: 0; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .card.active { background: white; color: #121212; z-index: 100; cursor: grab; touch-action: none; }
        
        .flying-mult {
            position: absolute; color: var(--pass-green); font-weight: 900; font-size: 24px;
            z-index: 3000; pointer-events: none; transition: all 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        #end-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; padding: 20px; text-align: center; }
        .final-cash-hero { font-size: 64px; color: var(--accent); margin: 5px 0; }
        #perfect-badge { background: var(--pass-green); color: white; padding: 5px 15px; border-radius: 5px; font-size: 14px; margin-bottom: 10px; display: none; animation: pulse 0.5s infinite alternate; }
        
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="strike-overlay" class="full-overlay">X</div>
    <div id="success-overlay" class="full-overlay">
        <span id="overlay-title">GOT IT</span>
        <span id="overlay-value" class="overlay-val">+X40</span>
    </div>
    
    <div class="header">
        <div id="multiplier-badge">X1</div>
        <div id="cash-display">$1,000</div>
        <div id="strike-icons"><span class="strike-x">X</span><span class="strike-x">X</span><span class="strike-x">X</span></div>
    </div>

    <div id="question-text">LOADING...</div>
    
    <div class="board" id="board">
        <div class="slot" id="s1" data-val="40"><span class="slot-rank">1</span><span class="slot-text">---------</span><span class="slot-val">+X40</span></div>
        <div class="slot" id="s2" data-val="25"><span class="slot-rank">2</span><span class="slot-text">---------</span><span class="slot-val">+X25</span></div>
        <div class="slot" id="s3" data-val="15"><span class="slot-rank">3</span><span class="slot-text">---------</span><span class="slot-val">+X15</span></div>
        <div class="slot" id="s4" data-val="5"><span class="slot-rank">4</span><span class="slot-text">---------</span><span class="slot-val">+X5</span></div>
        <div class="slot" id="s5" data-val="3"><span class="slot-rank">5</span><span class="slot-text">---------</span><span class="slot-val">+X3</span></div>
    </div>

    <div id="deck-area"></div>

    <div id="end-screen">
        <div id="perfect-badge">PERFECT BOARD: 2X BONUS</div>
        <h1 id="completion-msg" style="letter-spacing: 4px; color: #fff; margin: 0;">BOARD COMPLETE</h1>
        <div id="final-mult-label" style="background: var(--accent); color:#000; padding: 2px 15px; border-radius: 50px; font-weight:900; margin-top: 10px;">X1</div>
        <div class="final-cash-hero" id="final-points">$1,000</div>
        <button onclick="initGame()" style="padding: 15px 40px; background: var(--accent); border: none; font-weight: bold; border-radius: 15px; cursor:pointer; margin-top:20px;">NEW SURVEY</button>
    </div>
</div>

<script>
    const database = [
        { q: "Something a cat does all day?", answers: { "SLEEP": 1, "EAT": 2, "CLEAN ITSELF": 3, "MEOW": 4, "CHASE LASER": 5 }, decoys: ["TAXES", "DEBT", "TRAFFIC", "RENT"] },
        { q: "Fruit bought by the bunch?", answers: { "BANANAS": 1, "GRAPES": 2, "CHERRIES": 3, "SPINACH": 4, "ASPARAGUS": 5 }, decoys: ["WINE", "NECKTIE", "TOOLBOX", "CASH"] }
    ];

    let currentQuestion, deck, strikes, currentIdx, found, currentMultiplier, displayedCash;
    const basePot = 1000;

    function initGame() {
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('perfect-badge').style.display = 'none';
        document.getElementById('game-container').style.borderColor = '#333';
        document.querySelectorAll('.strike-x').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.slot').forEach(s => { s.classList.remove('revealed'); s.querySelector('.slot-text').innerText = '---------'; });
        
        currentQuestion = database[Math.floor(Math.random() * database.length)];
        document.getElementById('question-text').innerText = currentQuestion.q;
        deck = [...Object.keys(currentQuestion.answers), ...currentQuestion.decoys].sort(() => Math.random() - 0.5);
        
        strikes = 0; currentIdx = 0; found = 0; currentMultiplier = 1; displayedCash = 1000;
        updateMultiplierUI(); updateCashUI(); renderStack();
    }

    function triggerSuccessOverlay(title, val) {
        const el = document.getElementById('success-overlay');
        document.getElementById('overlay-title').innerText = (title === "DODGE") ? "DODGE" : "GOT IT";
        document.getElementById('overlay-value').innerText = `+X${val}`;
        el.style.display = 'flex';
        el.style.animation = 'pop 0.3s forwards';
        setTimeout(() => { el.style.display = 'none'; }, 600);
    }

    function renderStack() {
        const deckArea = document.getElementById('deck-area');
        deckArea.innerHTML = '';
        if (currentIdx + 1 < deck.length) {
            const p = createCard(deck[currentIdx + 1], 'peek', currentIdx + 2);
            p.style.transform = `translateY(8px) scale(0.96)`; deckArea.appendChild(p);
        }
        if (currentIdx < deck.length) {
            const a = createCard(deck[currentIdx], 'active', currentIdx + 1);
            deckArea.appendChild(a);
            initDrag(a);
        }
    }

    function createCard(text, type, num) {
        const d = document.createElement('div'); d.className = `stack-item card ${type}`;
        d.innerHTML = `<div style="font-size:20px; font-weight:900; text-align:center; padding:0 10px;">${text}</div><div style="font-size:10px; opacity:0.4; margin-top:5px;">${num} / ${deck.length}</div>`;
        return d;
    }

    function initDrag(el) {
        let x = 0, y = 0;
        interact(el).draggable({
            listeners: {
                move(e) { x += e.dx; y += e.dy; e.target.style.transform = `translate(${x}px, ${y}px) rotate(${x/15}deg)`; },
                end(e) {
                    if (y < -100) resolve(true, e.target);
                    else if (y > 100) resolve(false, e.target);
                    else { e.target.style.transition = 'transform 0.2s'; e.target.style.transform = `translate(0,0)`; x = 0; y = 0; }
                }
            }
        });
    }

    function resolve(isKeep, cardEl) {
        const val = cardEl.querySelector('div').innerText;
        const rank = currentQuestion.answers[val];
        const multValues = [40, 25, 15, 5, 3];
        
        // Capture exact release coordinates for fly-in physics
        const cardRect = cardEl.getBoundingClientRect();
        const cardPos = { x: cardRect.left + (cardRect.width / 2), y: cardRect.top };

        if (isKeep) {
            if (rank) {
                const addMult = multValues[rank-1];
                triggerSuccessOverlay(val, addMult);
                const slot = document.getElementById(`s${rank}`);
                cardEl.style.transition = 'all 0.3s ease-in';
                cardEl.style.transform = `translateY(-450px) scale(0.1)`;
                setTimeout(() => {
                    slot.querySelector('.slot-text').innerText = val;
                    slot.classList.add('revealed');
                    animateFlyingMult(slot, addMult);
                }, 400);
                found++;
                if (found === 5) document.getElementById('game-container').style.borderColor = 'var(--pass-green)';
                setTimeout(nextCard, 500);
            } else {
                strikes++;
                document.getElementById('game-container').style.transform = 'translateX(10px)';
                setTimeout(() => { document.getElementById('game-container').style.transform = 'translateX(0)'; }, 50);
                document.getElementById('strike-overlay').style.display = 'flex';
                setTimeout(() => { document.getElementById('strike-overlay').style.display = 'none'; }, 600);
                updateStrikeIcons();
                nextCard();
            }
        } else {
            if (!rank) {
                triggerSuccessOverlay("DODGE", 1);
                // Launch from the current card drop location
                setTimeout(() => animateFlyingMult(null, 1, cardPos), 300);
            }
            nextCard();
        }
    }

    function animateFlyingMult(startEl, amount, cardPos = null) {
        const badge = document.getElementById('multiplier-badge');
        const endRect = badge.getBoundingClientRect();
        
        let startX, startY;
        if (startEl) {
            const rect = startEl.getBoundingClientRect();
            startX = rect.left;
            startY = rect.top;
        } else if (cardPos) {
            startX = cardPos.x - 20;
            startY = cardPos.y;
        } else {
            startX = 180; startY = 550;
        }

        const flyer = document.createElement('div');
        flyer.className = 'flying-mult';
        flyer.innerText = `+X${amount}`;
        flyer.style.left = startX + 'px';
        flyer.style.top = startY + 'px';
        document.body.appendChild(flyer);

        setTimeout(() => {
            flyer.style.left = (endRect.left + 10) + 'px';
            flyer.style.top = (endRect.top + 5) + 'px';
            flyer.style.transform = 'scale(0.3)';
            flyer.style.opacity = '0';
        }, 50);

        setTimeout(() => {
            flyer.remove();
            currentMultiplier += amount;
            updateMultiplierUI();
            updateCashUI();
        }, 600);
    }

    function updateMultiplierUI() {
        const badge = document.getElementById('multiplier-badge');
        badge.innerText = `X${currentMultiplier}`;
        badge.style.transform = 'scale(1.4)';
        setTimeout(() => badge.style.transform = 'scale(1)', 200);
    }

    function updateCashUI() {
        const cashEl = document.getElementById('cash-display');
        const targetCash = basePot * currentMultiplier;
        if (displayedCash < targetCash) {
            const step = Math.ceil((targetCash - displayedCash) / 10);
            displayedCash += step;
            cashEl.innerText = `$${displayedCash.toLocaleString()}`;
            if (displayedCash < targetCash) setTimeout(updateCashUI, 30);
        } else {
            cashEl.innerText = `$${targetCash.toLocaleString()}`;
        }
    }

    function updateStrikeIcons() { const icons = document.querySelectorAll('.strike-x'); if (strikes > 0 && strikes <= 3) icons[strikes - 1].classList.add('active'); }
    
    function nextCard() {
        currentIdx++;
        if (found === 5 || strikes >= 3 || currentIdx >= deck.length) setTimeout(endGame, 1500);
        else renderStack();
    }

    function endGame() {
        const endScreen = document.getElementById('end-screen');
        const compMsg = document.getElementById('completion-msg');
        const perfectBadge = document.getElementById('perfect-badge');
        
        endScreen.style.display = 'flex';
        
        if (found === 5 && strikes === 0) {
            currentMultiplier *= 2; 
            compMsg.innerText = "PERFECT BOARD!";
            perfectBadge.style.display = 'block';
        } else if (found === 5) {
            compMsg.innerText = "BOARD COMPLETE";
        } else {
            compMsg.innerText = "SURVEY ENDED";
        }

        document.getElementById('final-mult-label').innerText = `X${currentMultiplier}`;
        document.getElementById('final-points').innerText = `$${(basePot * currentMultiplier).toLocaleString()}`;
    }

    initGame();
</script>
</body>
</html>
